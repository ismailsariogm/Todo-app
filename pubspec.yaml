name: todo_note
description: "Şık, hızlı, offline-first ve ekip işbirliği destekleyen To-Do Web Uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI
  flutter_slidable: ^3.1.1
  google_fonts: ^8.0.2

  # Utilities
  uuid: ^4.4.2
  intl: 0.20.2
  shared_preferences: ^2.3.2
  collection: ^1.18.0
  image_picker: ^1.2.1
  file_picker: ^8.0.0
  image: ^4.1.7
  http: ^1.6.0
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
